<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kalkulator programisty – konwersja liczb między systemami binarnym, ósemkowym, dziesiętnym i szesnastkowym oraz operacje bitowe (AND, OR, XOR, NOT, przesunięcia bitowe). Motyw Matrix, styl konsoli Unix.">
    <meta name="keywords" content="kalkulator programisty, konwersja bin hex oct dec, operacje bitowe, AND OR XOR NOT shift, matrix calculator">

    <link rel="icon" href="calculate_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" type="image/x-icon">

    <title>Kalkulator Programisty • Matrix Edition</title>

    <link rel="stylesheet" href="style.css">
    
    <!-- Schema.org JSON-LD  -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Kalkulator Programisty - Matrix Edition",
      "description": "Kalkulator dla programistów. Konwersja liczb między systemami: binarne (BIN), ósemkowe (OCT), dziesiętne (DEC), szesnastkowe (HEX). Operacje bitowe: AND, OR, XOR, NOT, przesunięcia bitowe (SHL, SHR).",
      "url": "https://kalkulator-programisty.netlify.app/",
      "applicationCategory": "UtilityApplication",
      "operatingSystem": "Web",
      "inLanguage": "pl",
      "featureList": [
        "Konwersja między systemami liczbowymi: BIN, OCT, DEC, HEX",
        "Operacje bitowe: AND, OR, XOR, NOT",
        "Przesunięcia bitowe: SHL (lewo), SHR (prawo)",
        "Interfejs responsywny"
      ]
    }
    </script>
</head>
<body>
    <!-- Tło z efektem "Matrix Rain" -->
    <canvas id="matrix-rain"></canvas>
    <script src="matrixRain.js"></script>
     
    <div class="container">
        <header>
            <h1>KALKULATOR PROGRAMISTY</h1>
            <p style="font-size: 1.6rem; margin-top: 8px;"> Konwersja + Operacje bitowe</p>
        </header>

        <div class="terminal">

            <!-- SEKCJA KONWERSJI LICZB -->
            <div class="section">
                <div class="section-title">1. KONWERSJA LICZB</div>
                <div class="conversions" id="conversions-container"></div>
                <div style="text-align: center; margin-top: 12px; font-size: 1.2rem; opacity: 0.8;">
                    Wpisz liczbę w dowolnym systemie – pozostałe zaktualizują się automatycznie
                </div>
            </div>

            <!-- SEKCJA OPERACJI BITOWYCH -->
            <div class="section">
                <div class="section-title">2. OPERACJE BITOWE</div>
                
                <div class="ops-panel">
                    <!-- Operand A: pierwszy operand dla operacji bitowych -->
                    <div class="operand-box">
                        <label>Operand A</label>
                        <input type="text" id="opA" value="255">
                        <select id="baseA">
                            <option value="2">BIN (2)</option>
                            <option value="8">OCT (8)</option>
                            <option value="10" selected>DEC (10)</option>
                            <option value="16">HEX (16)</option>
                        </select>
                    </div>

                    <!-- Operand B: drugi operand lub ilość przesunięć dla operacji przesunięcia -->
                    <div class="operand-box">
                        <label>Operand B / Ilość przesunięć</label>
                        <input type="text" id="opB" value="3">
                        <select id="baseB">
                            <option value="2">BIN (2)</option>
                            <option value="8">OCT (8)</option>
                            <option value="10" selected>DEC (10)</option>
                            <option value="16">HEX (16)</option>
                        </select>
                    </div>
                </div>

                <div class="controls">
                    <label style="font-size: 1.5rem; margin-right: 10px;">Operacja:</label>
                    <select id="operation" style="width: auto; min-width: 180px;">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                        <option value="XOR">XOR</option>
                        <option value="NOT">NOT (~)</option>
                        <option value="SHL">SHL (&lt;&lt;)</option>
                        <option value="SHR">SHR (&gt;&gt;)</option>
                    </select>
                    
                    <button onclick="performBitwiseOperation()">WYKONAJ OPERACJĘ</button>
                    <button onclick="clearAll()" style="background:#330000; border-color:#ff4444;">WYCZYŚĆ</button>
                </div>

                <!-- Miejsce na wyświetlanie wyniku operacji bitowej -->
                <div class="result-box" id="result-box">
                    <strong>WYNIK OPERACJI BITOWEJ:</strong>
                    <div class="result-displays" id="result-displays"></div>
                </div>
            </div>
        </div>

        <footer>
            Praktyki 2026
        </footer>
    </div>


    <script src="main.js"></script>
</body>
</html>
